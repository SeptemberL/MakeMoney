# NGA 论坛帖子监控配置
# 监控的帖子列表请在系统「NGA 监控」页面中添加/编辑，不再由此文件配置。
# auth、settings 仍由此文件提供。

settings:
  # User-Agent：建议使用 NGA_WP_JW（与官方文档一致，避免“访客不能直接访问”）
  # 全局开关：1 启用，0 关闭（为 0 时程序启动不运行 NGA 爬虫）
  enabled: 0
  user_agent: 'NGA_WP_JW'
  # 爬取间隔（秒），建议不低于 10 秒，避免被封
  poll_interval: 30
  # 请求超时（秒）
  request_timeout: 15
  # 请求失败重试次数
  max_retries: 3
  # 楼层漏爬调试日志：1 开启详细 log 追查漏楼原因，0 关闭
  debug_floor_log: 0

# NGA 账号 Cookie（必填，否则无法访问登录内容）
auth:
  ngaPassportUid: '5337595'
  ngaPassportCid: 'X9r3v6avhskvr9jvadop7jlgm76g3d5ovcj37qjr'

# 监控的帖子列表（已迁移至 Web 页面管理，此处仅作示例保留，程序不会读取）
threads: []
