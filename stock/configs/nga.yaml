# NGA 论坛帖子监控配置
# 帖子列表（threads）会在首次启动时同步到数据库 nga_thread_config 表；
# 之后是否“程序启动后默认运行”由数据库中的 auto_run 字段控制（1=自动运行，0=不运行）。
# auth、settings 仍由此文件提供。

settings:
  # 爬取间隔（秒），建议不低于 10 秒，避免被封
  poll_interval: 30
  # 请求超时（秒）
  request_timeout: 15
  # 请求失败重试次数
  max_retries: 3

# NGA 账号 Cookie（必填，否则无法访问登录内容）
auth:
  ngaPassportUid: '5337595'
  ngaPassportCid: 'X9r3v6avhskvr9jvadop7jlgm76g3d5ovcj37qjr'

# 监控的帖子列表
threads:
  - tid: 45974302
    # 帖子备注名（仅用于日志显示）
    name: '狼大 26 年主帖子'
    # 关注的用户 authorId 列表（整数）。为空则监控所有用户
    watch_author_ids:
      - 150058
    # 发送消息使用的群组ID（关联 send_message_group.yaml 里的 group_id）
    message_group_id: 0
    # 是否启用该帖子的监控
    enabled: true

  #- tid: 87654321
  #  name: '示例帖子2'
  #  # 空列表 = 监控所有发言
  #  watch_author_ids: []
 #   message_group_id: 2
 #   enabled: false
