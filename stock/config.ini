[DEFAULT]
DEBUG = False
SECRET_KEY = your-secret-key-here
UPDATE_STOCKS_DELAY = 0.2

[DATABASE]
# DB_TYPE: mysql / sqlite （默认 mysql）
DB_TYPE = mysql
DB_HOST = 
DB_PORT = 
DB_NAME = 
DB_USER = 
DB_PASSWORD = 
DB_CHARSET = utf8mb4
# SQLite 时使用的文件路径（DB_TYPE=sqlite 时生效，支持相对路径或绝对路径）
DB_PATH = database/stock.db

[WX]
EnableWX = 0
# 测试发送图片：点击主页「测试发送图片」时下载的图片 URL，发送到下方指定聊天
TestImageUrl = 
TestImageSendTo = 

# 信号等消息推送通道：wechat（默认，依赖本机微信+wxauto）或 feishu（HTTP Webhook）
[NOTIFY]
channel = feishu
# 微信通道下，无 group_id 的汇总通知（批量更新等）使用的群组 ID；不填则用 [WX] TestImageSendTo 会话名
# fallback_group_id = 1

# channel=feishu 时必填：飞书自定义机器人 Webhook 完整地址
# POST JSON: {"msg_type":"text","content":{"text":"..."}}
[FEISHU]
webhook_url = 
# 签名校验密钥（飞书机器人安全设置）；非空时请求体会带 timestamp 与 sign
sign = 
# 可选，HTTP 超时秒数，默认 10
timeout_seconds = 10

[TUSHARE]
# 在 https://tushare.pro 注册后获取 Token
TOKEN =  