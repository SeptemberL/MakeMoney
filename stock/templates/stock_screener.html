<!DOCTYPE html>
<html>
<head>
    <title>股票筛选器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .back-link {
            margin: 20px 0;
        }
        .screening-result {
            margin-top: 20px;
        }
        .stock-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .stock-item:hover {
            background-color: #f8f9fa;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-spinner {
            text-align: center;
        }
        .result-count {
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 加载遮罩 -->
    <div class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <div class="mt-2">正在计算中，请稍候...</div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="back-link">
            <a href="/" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> 返回主页
            </a>
        </div>

        <div class="card">
            <div class="card-header">
                技术指标筛选
            </div>
            <div class="card-body">
                <!-- 筛选选项 -->
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="screeningOption" 
                               id="bottomDivergence" value="bottomDivergence" checked>
                        <label class="form-check-label" for="bottomDivergence">
                            计算所有股票最近形成底背离的股票
                        </label>
                    </div>
                </div>

                <!-- 开始筛选按钮 -->
                <button type="button" class="btn btn-primary" onclick="startScreening()">
                    开始筛选
                </button>
            </div>
        </div>

        <!-- 筛选结果 -->
        <div class="screening-result">
            <div class="card">
                <div class="card-header">
                    筛选结果
                </div>
                <div class="card-body">
                    <div class="result-count"></div>
                    <div id="resultList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startScreening() {
            // 显示加载遮罩
            $('.loading-overlay').css('display', 'flex');
            
            // 获取选中的筛选选项
            const screeningType = $('input[name="screeningOption"]:checked').val();
            
            // 发送筛选请求
            $.ajax({
                url: '/api/screen_stocks',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    type: screeningType
                }),
                success: function(response) {
                    if (response.success) {
                        displayResults(response.results);
                    } else {
                        alert('筛选失败: ' + response.error);
                    }
                },
                error: function(xhr) {
                    alert('筛选失败: ' + (xhr.responseJSON?.error || '未知错误'));
                },
                complete: function() {
                    // 隐藏加载遮罩
                    $('.loading-overlay').hide();
                }
            });
        }

        function displayResults(results) {
            const resultCount = results.length;
            $('.result-count').text(`找到 ${resultCount} 只符合条件的股票`);

            const resultHtml = results.map(stock => `
                <div class="stock-item">
                    <div class="row">
                        <div class="col-md-3">
                            <strong>${stock.code}</strong>
                            ${stock.name ? `<span class="text-muted">(${stock.name})</span>` : ''}
                        </div>
                        <div class="col-md-6">
                            ${stock.divergence_info}
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-sm btn-primary" 
                                    onclick="window.location.href='/?stock=${stock.code}'">
                                查看详情
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            $('#resultList').html(resultHtml || '<p class="text-muted">没有找到符合条件的股票</p>');
        }
    </script>
</body>
</html>
