<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGA 监控任务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .task-row:hover { background-color: #f8f9fa; }
        .status-badge { min-width: 5rem; }
        .back-link { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="back-link">
            <a href="/" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> 返回主页
            </a>
        </div>

        <h2 class="mb-3">NGA 监控任务</h2>
        <p class="text-muted small mb-4">
            开启后，程序启动时会自动监控该帖子；关闭后不再监控。修改开关将在<strong>下次启动程序</strong>时生效。
        </p>

        <div class="card">
            <div class="card-body">
                <div id="loading" class="text-center py-4 text-muted">
                    <span class="spinner-border spinner-border-sm me-2"></span>加载中...
                </div>
                <div id="taskList" style="display: none;"></div>
                <div id="emptyTip" class="text-muted text-center py-4" style="display: none;">
                    暂无监控任务，请先在 configs/nga.yaml 中配置 threads 并启动一次程序同步到数据库。
                </div>
                <div id="errorTip" class="alert alert-danger" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadTasks() {
            const loading = document.getElementById('loading');
            const taskList = document.getElementById('taskList');
            const emptyTip = document.getElementById('emptyTip');
            const errorTip = document.getElementById('errorTip');

            loading.style.display = 'block';
            taskList.style.display = 'none';
            emptyTip.style.display = 'none';
            errorTip.style.display = 'none';

            fetch('/api/nga_tasks')
                .then(res => res.json())
                .then(data => {
                    loading.style.display = 'none';
                    if (!data.success) {
                        errorTip.textContent = data.message || '加载失败';
                        errorTip.style.display = 'block';
                        return;
                    }
                    const tasks = data.tasks || [];
                    if (tasks.length === 0) {
                        emptyTip.style.display = 'block';
                        return;
                    }
                    renderTasks(tasks);
                    taskList.style.display = 'block';
                })
                .catch(err => {
                    loading.style.display = 'none';
                    errorTip.textContent = '请求失败: ' + err.message;
                    errorTip.style.display = 'block';
                });
        }

        function renderTasks(tasks) {
            const html = `
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>帖子名称</th>
                                <th>帖子 ID (tid)</th>
                                <th>消息群组</th>
                                <th>运行状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tasks.map(t => `
                                <tr class="task-row" data-tid="${t.tid}">
                                    <td>${escapeHtml(t.name || '-')}</td>
                                    <td><code>${t.tid}</code></td>
                                    <td>${escapeHtml(String(t.message_group_id ?? ''))}</td>
                                    <td>
                                        <span class="badge status-badge ${t.auto_run ? 'bg-success' : 'bg-secondary'}">
                                            ${t.auto_run ? '已开启' : '已关闭'}
                                        </span>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm ${t.auto_run ? 'btn-warning' : 'btn-success'}" 
                                                onclick="toggleTask(${t.tid})" 
                                                title="${t.auto_run ? '点击关闭' : '点击开启'}">
                                            ${t.auto_run ? '关闭' : '开启'}
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('taskList').innerHTML = html;
        }

        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function toggleTask(tid) {
            fetch(`/api/nga_tasks/${tid}/toggle`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        loadTasks();
                    } else {
                        alert(data.message || '操作失败');
                    }
                })
                .catch(err => {
                    alert('请求失败: ' + err.message);
                });
        }

        document.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>
</html>
