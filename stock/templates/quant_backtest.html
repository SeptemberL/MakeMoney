<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略回测 - 股票分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        .quant-hero {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
            color: #fff;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .quant-hero h1 { font-weight: 600; margin-bottom: 0.5rem; }
        .quant-hero .lead { opacity: 0.9; }
        #result-area { min-height: 120px; }
        pre.trades-pre { max-height: 280px; overflow: auto; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">股票分析系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/indicator_manager">指标管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stock_filter"><i class="fas fa-filter"></i> 股票筛选器</a></li>
                    <li class="nav-item"><a class="nav-link" href="/nga_monitor"><i class="fas fa-rss"></i> NGA 监控</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/quant"><i class="fas fa-chart-line"></i> 量化</a></li>
                    <li class="nav-item"><a class="nav-link" href="/market_open_score"><i class="fas fa-sun"></i> 今日大盘开盘评分</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4 px-4">
        <div class="quant-hero">
            <h1><i class="fas fa-history me-2"></i>策略回测（双均线）</h1>
            <p class="lead mb-0">使用本地已拉取的日线数据；金叉买入、死叉卖出、收盘价成交。</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-header"><i class="fas fa-sliders-h me-2"></i>参数</div>
                    <div class="card-body">
                        <form id="bt-form">
                            <div class="mb-3">
                                <label class="form-label" for="stock_code">股票代码</label>
                                <input type="text" class="form-control" id="stock_code" name="stock_code" placeholder="如 600000" maxlength="6" required>
                                <div class="form-text">6 位 A 股代码，需本地已有该标的日线表</div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label" for="start_date">开始日期</label>
                                    <input type="date" class="form-control" id="start_date" name="start_date" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label" for="end_date">结束日期</label>
                                    <input type="date" class="form-control" id="end_date" name="end_date" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label" for="short_window">短期均线</label>
                                    <input type="number" class="form-control" id="short_window" name="short_window" value="5" min="1" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label" for="long_window">长期均线</label>
                                    <input type="number" class="form-control" id="long_window" name="long_window" value="20" min="2" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label" for="initial_cash">初始资金</label>
                                    <input type="number" class="form-control" id="initial_cash" name="initial_cash" value="100000" min="1" step="1" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" id="btn-run">
                                <i class="fas fa-play me-1"></i>运行回测
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header"><i class="fas fa-chart-area me-2"></i>结果</div>
                    <div class="card-body" id="result-area">
                        <p class="text-muted mb-0">提交表单后在此展示累计收益、最大回撤与交易明细。</p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-5 mb-4 text-muted small">
            <a href="/quant">返回量化</a>
            ·
            使用说明见仓库内 <code>Docs/量化回测系统.md</code>，索引见 <code>Docs/项目基础框架.md</code> 页面路由表。
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
(function () {
    const end = document.getElementById('end_date');
    const start = document.getElementById('start_date');
    const endD = new Date();
    const startD = new Date();
    startD.setFullYear(startD.getFullYear() - 1);
    function fmt(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + day;
    }
    end.value = fmt(endD);
    start.value = fmt(startD);

    document.getElementById('bt-form').addEventListener('submit', function (e) {
        e.preventDefault();
        const btn = document.getElementById('btn-run');
        const area = document.getElementById('result-area');
        btn.disabled = true;
        area.innerHTML = '<p class="text-secondary mb-0"><i class="fas fa-spinner fa-spin me-2"></i>计算中…</p>';
        const payload = {
            stock_code: document.getElementById('stock_code').value.trim(),
            start_date: document.getElementById('start_date').value,
            end_date: document.getElementById('end_date').value,
            short_window: parseInt(document.getElementById('short_window').value, 10),
            long_window: parseInt(document.getElementById('long_window').value, 10),
            initial_cash: parseFloat(document.getElementById('initial_cash').value)
        };
        fetch('/api/quant/backtest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
            .then(function (o) {
                if (!o.ok || !o.j.success) {
                    area.innerHTML = '<div class="alert alert-danger mb-0">' + (o.j.message || '请求失败') + '</div>';
                    return;
                }
                const d = o.j.data;
                const trades = (d.trades || []).map(function (t) {
                    return JSON.stringify(t);
                }).join('\n');
                area.innerHTML =
                    '<h5 class="mb-3">摘要</h5>' +
                    '<ul class="list-unstyled">' +
                    '<li><strong>累计收益率</strong>：' + d.total_return_pct + '%</li>' +
                    '<li><strong>最大回撤</strong>：' + d.max_drawdown_pct + '%</li>' +
                    '<li><strong>期末权益</strong>：' + d.final_equity + '（初始 ' + d.initial_cash + '）</li>' +
                    '<li><strong>K 线根数</strong>：' + d.bars + '</li>' +
                    '</ul>' +
                    '<h6 class="mt-3">交易明细</h6>' +
                    '<pre class="trades-pre bg-light p-2 rounded border">' + (trades || '无') + '</pre>';
            })
            .catch(function () {
                area.innerHTML = '<div class="alert alert-danger mb-0">网络或服务器错误</div>';
            })
            .finally(function () { btn.disabled = false; });
    });
})();
    </script>
</body>
</html>
