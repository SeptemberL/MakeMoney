<!DOCTYPE html>
<html>
<head>
    <title>聊天列表管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .list-item:hover {
            background-color: #f8f9fa;
        }
        .back-link {
            margin: 20px 0;
        }
        .text-muted {
            color: #6c757d !important;
        }
        .form-check-input {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="back-link">
            <a href="/" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> 返回主页
            </a>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        添加新项目
                    </div>
                    <div class="card-body">
                        <form id="addItemForm" onsubmit="return addItem(event)">
                            <div class="input-group">
                                <input type="text" class="form-control" id="newItem" placeholder="请输入内容" required>
                                <button type="submit" class="btn btn-primary">添加</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header">
                        聊天群列表
                    </div>
                    <div class="card-body">
                        <div id="itemList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 加载列表
        function loadItems() {
            $.get('/api/items', function(items) {
                const itemListHtml = items.map(item => `
                    <div class="list-item">
                        <div class="d-flex justify-content-between align-items-center w-100">
                            <div class="d-flex align-items-center">
                                <div class="form-check form-switch me-3">
                                    <input class="form-check-input" type="checkbox" 
                                           ${item.status ? 'checked' : ''} 
                                           onchange="toggleStatus('${item.item}')">
                                </div>
                                <span class="${item.status ? '' : 'text-muted'}">${item.item}</span>
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="deleteItem('${item.item}')">删除</button>
                        </div>
                    </div>
                `).join('');
                
                $('#itemList').html(itemListHtml || '<p class="text-muted">暂无数据</p>');
            });
        }

        // 添加切换状态的函数
        function toggleStatus(item) {
            $.ajax({
                url: `/api/items/${encodeURIComponent(item)}/toggle`,
                method: 'POST',
                success: function(response) {
                    if (response.success) {
                        loadItems();
                    } else {
                        alert('切换状态失败: ' + response.error);
                    }
                },
                error: function(xhr) {
                    alert('切换状态失败: ' + (xhr.responseJSON?.error || '未知错误'));
                }
            });
        }

        // 修改添加项目的函数
        function addItem(event) {
            event.preventDefault();
            
            const newItem = $('#newItem').val().trim();
            if (!newItem) {
                alert('请输入内容');
                return false;
            }
            
            $.ajax({
                url: '/api/items',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ 
                    item: newItem,
                    status: true  // 新添加的项目默认为开启状态
                }),
                success: function(response) {
                    if (response.success) {
                        $('#newItem').val('');
                        loadItems();
                    } else {
                        alert('添加失败: ' + response.error);
                    }
                },
                error: function(xhr) {
                    alert('添加失败: ' + (xhr.responseJSON?.error || '未知错误'));
                }
            });
            
            return false;
        }

        // 删除项目
        function deleteItem(item) {
            if (confirm(`确定要删除 "${item}" 吗？`)) {
                $.ajax({
                    url: `/api/items/${encodeURIComponent(item)}`,
                    method: 'DELETE',
                    success: function(response) {
                        if (response.success) {
                            loadItems();
                        } else {
                            alert('删除失败: ' + response.error);
                        }
                    },
                    error: function(xhr) {
                        alert('删除失败: ' + (xhr.responseJSON?.error || '未知错误'));
                    }
                });
            }
        }

        // 页面加载完成后初始化
        $(document).ready(function() {
            loadItems();
        });
    </script>
</body>
</html>
