<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGA 楼层列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .floor-row:hover { background-color: #f8f9fa; }
        .status-badge { min-width: 4rem; }
        .content-preview {
            max-width: 520px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .back-link { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container-fluid py-3">
        <div class="back-link">
            <a href="/nga_monitor" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> 返回 NGA 监控
            </a>
        </div>

        <h4 class="mb-2">
            帖子楼层列表
            {% if thread %}
                <small class="text-muted ms-2">
                    {{ thread.name or '' }} (tid={{ tid }})
                </small>
            {% else %}
                <small class="text-muted ms-2">
                    tid={{ tid }}
                </small>
            {% endif %}
        </h4>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <p class="text-muted small mb-3">
            显示该帖子最近抓取的楼层，标记是否已发送到配置的消息群组。点击「发送」可手动推送单条楼层。
        </p>

        <div class="card">
            <div class="card-body">
                <div id="loading" class="text-center py-4 text-muted">
                    <span class="spinner-border spinner-border-sm me-2"></span>加载中...
                </div>
                <div id="errorTip" class="alert alert-danger" style="display:none;"></div>
                <div id="infoTip" class="alert alert-info" style="display:none;"></div>
                <div id="floorList" style="display:none;"></div>
                <div id="emptyTip" class="text-center text-muted py-4" style="display:none;">
                    暂无抓取到的楼层。
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const TID = {{ tid }};

        function loadFloors() {
            const loading  = document.getElementById('loading');
            const errorTip = document.getElementById('errorTip');
            const infoTip  = document.getElementById('infoTip');
            const list     = document.getElementById('floorList');
            const emptyTip = document.getElementById('emptyTip');

            loading.style.display  = 'block';
            errorTip.style.display = 'none';
            infoTip.style.display  = 'none';
            list.style.display     = 'none';
            emptyTip.style.display = 'none';

            fetch('/api/nga_floors/' + TID)
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    loading.style.display = 'none';
                    if (!data.success) {
                        errorTip.textContent = data.message || '加载失败';
                        errorTip.style.display = 'block';
                        return;
                    }
                    if (data.message) {
                        infoTip.textContent = data.message;
                        infoTip.style.display = 'block';
                    }
                    var floors = data.floors || [];
                    if (floors.length === 0) {
                        emptyTip.style.display = 'block';
                        return;
                    }
                    renderFloors(floors);
                    list.style.display = 'block';
                })
                .catch(function(err) {
                    loading.style.display = 'none';
                    errorTip.textContent = '请求失败: ' + err.message;
                    errorTip.style.display = 'block';
                });
        }

        function renderFloors(floors) {
            var html = '' +
                '<div class="table-responsive">' +
                '<table class="table table-hover align-middle table-sm">' +
                '<thead>' +
                '<tr>' +
                '<th style="width:5rem;">楼层</th>' +
                '<th style="width:5rem;">PID</th>' +
                '<th style="width:10rem;">作者</th>' +
                '<th style="width:10rem;">时间</th>' +
                '<th>内容预览</th>' +
                '<th style="width:6rem;">状态</th>' +
                '<th style="width:6rem;">操作</th>' +
                '</tr>' +
                '</thead>' +
                '<tbody>' +
                floors.map(function(f) {
                    var statusClass = f.sent ? 'bg-success' : 'bg-secondary';
                    var statusText  = f.sent ? '已发送' : '未发送';
                    var content     = (f.content_text || '').replace(/\\s+/g, ' ');
                    return '' +
                        '<tr class="floor-row" data-pid="' + f.pid + '">' +
                        '<td>#' + f.floor_num + '</td>' +
                        '<td><code>' + f.pid + '</code></td>' +
                        '<td>' + escapeHtml(f.author_name || '') + '<br><span class="text-muted small">uid:' + f.author_id + '</span></td>' +
                        '<td><span class="small">' + escapeHtml(f.post_date || '') + '</span></td>' +
                        '<td class="content-preview"><span class="small" title="' + escapeHtml(content) + '">' + escapeHtml(content) + '</span></td>' +
                        '<td><span class="badge status-badge ' + statusClass + '">' + statusText + '</span></td>' +
                        '<td>' +
                        '<button type="button" class="btn btn-sm btn-outline-primary" onclick="sendFloor(' + f.pid + ')">发送</button>' +
                        '</td>' +
                        '</tr>';
                }).join('') +
                '</tbody></table></div>';

            document.getElementById('floorList').innerHTML = html;
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function sendFloor(pid) {
            if (!confirm('确定要发送该楼层 (pid=' + pid + ')?')) return;
            fetch('/api/nga_floors/' + TID + '/' + pid + '/send', {
                method: 'POST'
            })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        loadFloors();
                    } else {
                        alert(data.message || '发送失败');
                    }
                })
                .catch(function(err) {
                    alert('请求失败: ' + err.message);
                });
        }

        document.addEventListener('DOMContentLoaded', loadFloors);
    </script>
</body>
</html>
