<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指标管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .indicator-card {
            transition: all 0.3s ease;
        }
        .indicator-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .view-badge {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
        }
        .enabled-badge {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>指标管理</h2>
            <button class="btn btn-primary" onclick="showAddModal()">
                <i class="bi bi-plus-lg"></i> 添加指标
            </button>
        </div>

        <div class="row" id="indicatorsList">
            <!-- 指标卡片将通过JavaScript动态添加 -->
        </div>
    </div>

    <!-- 添加/编辑指标模态框 -->
    <div class="modal fade" id="indicatorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">添加指标</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="indicatorForm">
                        <input type="hidden" id="indicatorId">
                        <div class="mb-3">
                            <label for="name" class="form-label">指标名称</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="viewNumber" class="form-label">所属视图</label>
                            <select class="form-select" id="viewNumber" required>
                                <option value="1">K线图</option>
                                <option value="2">MACD</option>
                                <option value="3">技术指标</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="className" class="form-label">类名</label>
                            <input type="text" class="form-control" id="className" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveIndicator()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let indicatorModal;
        
        document.addEventListener('DOMContentLoaded', function() {
            indicatorModal = new bootstrap.Modal(document.getElementById('indicatorModal'));
            loadIndicators();
        });

        function loadIndicators() {
            fetch('/api/indicators')
                .then(response => response.json())
                .then(data => {
                    const indicatorsList = document.getElementById('indicatorsList');
                    indicatorsList.innerHTML = '';
                    
                    data.forEach(indicator => {
                        const card = createIndicatorCard(indicator);
                        indicatorsList.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error('加载指标失败:', error);
                    alert('加载指标失败，请刷新页面重试');
                });
        }

        function createIndicatorCard(indicator) {
            const div = document.createElement('div');
            div.className = 'col-md-4 mb-3';
            div.innerHTML = `
                <div class="card indicator-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title">${indicator.name}</h5>
                            <span class="badge bg-primary view-badge">视图 ${indicator.view_number}</span>
                        </div>
                        <p class="card-text"><small class="text-muted">类名: ${indicator.class_name}</small></p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge ${indicator.is_enabled ? 'bg-success' : 'bg-secondary'} enabled-badge"
                                  onclick="toggleIndicator(${indicator.id}, ${!indicator.is_enabled})">
                                ${indicator.is_enabled ? '已启用' : '已禁用'}
                            </span>
                            <div>
                                <button class="btn btn-sm btn-outline-primary me-2" onclick="showEditModal(${indicator.id})">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteIndicator(${indicator.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = '添加指标';
            document.getElementById('indicatorForm').reset();
            document.getElementById('indicatorId').value = '';
            indicatorModal.show();
        }

        function showEditModal(id) {
            document.getElementById('modalTitle').textContent = '编辑指标';
            document.getElementById('indicatorId').value = id;
            
            fetch(`/api/indicators/${id}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('name').value = data.name;
                    document.getElementById('viewNumber').value = data.view_number;
                    document.getElementById('className').value = data.class_name;
                    indicatorModal.show();
                })
                .catch(error => {
                    console.error('获取指标详情失败:', error);
                    alert('获取指标详情失败，请重试');
                });
        }

        function saveIndicator() {
            const id = document.getElementById('indicatorId').value;
            const data = {
                name: document.getElementById('name').value,
                view_number: parseInt(document.getElementById('viewNumber').value),
                class_name: document.getElementById('className').value
            };

            const url = id ? `/api/indicators/${id}` : '/api/indicators';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    indicatorModal.hide();
                    loadIndicators();
                } else {
                    alert(result.message || '操作失败，请重试');
                }
            })
            .catch(error => {
                console.error('保存指标失败:', error);
                alert('保存失败，请重试');
            });
        }

        function deleteIndicator(id) {
            if (!confirm('确定要删除这个指标吗？')) {
                return;
            }

            fetch(`/api/indicators/${id}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    loadIndicators();
                } else {
                    alert(result.message || '删除失败，请重试');
                }
            })
            .catch(error => {
                console.error('删除指标失败:', error);
                alert('删除失败，请重试');
            });
        }

        function toggleIndicator(id, isEnabled) {
            fetch(`/api/indicators/${id}/toggle`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ is_enabled: isEnabled })
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    loadIndicators();
                } else {
                    alert(result.message || '切换状态失败，请重试');
                }
            })
            .catch(error => {
                console.error('切换指标状态失败:', error);
                alert('切换状态失败，请重试');
            });
        }
    </script>
</body>
</html>
