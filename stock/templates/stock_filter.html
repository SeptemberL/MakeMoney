<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票筛选器</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">股票分析系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/indicator_manager">指标管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/stock_filter">股票筛选器</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-3">
                <!-- 筛选条件卡片 -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">筛选条件</h5>
                    </div>
                    <div class="card-body">
                        <form id="filterForm" onsubmit="event.preventDefault(); updateFilterResults();">
                            <!-- 基础设置 -->
                            <div class="mb-3">
                                <label class="form-label">市场</label>
                                <select class="form-select" id="marketSelect">
                                    <option value="cn">缅A</option>
                                    <option value="hk">港服</option>
                                    <option value="us">美服</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">周期</label>
                                <select class="form-select" id="periodSelect">
                                    <option value="k1d">日k</option>
                                    <option value="k1m">月k</option>
                                    <option value="k1q">季k</option>
                                    <option value="k1y">年k</option>
                                    <option value="k1m">1分</option>
                                    <option value="k3m">3分</option>
                                    <option value="k5m">5分</option>
                                    <option value="k10m">10分</option>
                                    <option value="k15m">15分</option>
                                    <option value="k30m">30分</option>
                                    <option value="k1h">1时</option>
                                    <option value="k2h">2时</option>
                                    <option value="k3h">3时</option>
                                    <option value="k4h">4时</option>
                                </select>
                            </div>
                            
                            <!-- 技术指标筛选 -->
                            <div class="mb-3">
                                <label class="form-label">技术指标</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="dljgFilter" name="dljgFilter" value="DLJG" checked>
                                    <label class="form-check-label" for="dljgFilter">
                                        定量结构（底背离结构）
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="bollFilter" name="bollFilter" value="BOLL">
                                    <label class="form-check-label" for="bollFilter">
                                        布林带3突破
                                    </label>
                                </div>
                            </div>
                            
                            <!-- 触发天数范围 -->
                            <div class="mb-3">
                                <label class="form-label">触发天数范围</label>
                                <input type="number" class="form-control" id="dayRange" placeholder="最低1天" value="1">
                            </div>
                            
                            <!-- 价格区间 -->
                            <div class="mb-3">
                                <label class="form-label">价格区间</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="priceMin" placeholder="最低">
                                    <span class="input-group-text">-</span>
                                    <input type="number" class="form-control" id="priceMax" placeholder="最高">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search"></i> 开始筛选
                            </button>
                        </form>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">定时筛选设置</h5>
                    </div>
                    <div class="card-body">
                        <form id="filterForm" onsubmit="event.preventDefault(); saveTimedScan();">
                            <div class="mb-3">
                                <label for="timeInput">选择时间：</label>
                                <input type="time" id="timeInput" name="timeInput" value="12:00" step="1800">
                            </div>

                            <style>
                                .editable-label {
                                  padding: 5px;
                                  border: 1px dashed #ccc; /* 虚线边框提示可编辑 */
                                  min-width: 100px;
                                  margin: 10px 0;
                                }
                                .editable-label:focus {
                                  outline: none;
                                  border-color: #007bff; /* 聚焦时高亮 */
                                }
                            </style>
                            <!-- 可编辑的标签 -->
                            <div class="mb-3">
                                <label for="scan_name">名称</label>
                                <div id="scan_name" class="editable-label" contenteditable="true">
                                    
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search"></i> 保存并开始筛选
                            </button>
                        </form>
                        <button onclick="showTimedScanList()" class="btn btn-primary w-100">
                            查看已保存筛选列表
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-9">
                <!-- 筛选结果卡片 -->
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">筛选结果</h5>
                        <div id="filterProgress" class="d-none">
                            <div class="progress" style="width: 200px;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                     role="progressbar" 
                                     style="width: 0%">
                                </div>
                            </div>
                            <small class="text-muted ms-2">
                                <span id="progressText">0/0</span>
                            </small>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>代码</th>
                                        <th>名称</th>
                                        <th>现价</th>
                                        <th>涨跌幅</th>
                                        <th>成交量</th>
                                        <th>匹配指标</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="filterResults">
                                    <!-- 结果将通过 JavaScript 动态添加 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade" id="timeScanList" tabindex="-1" aria-labelledby="timeScanListLabel" aria-hidden="true">
        <div class="modal-dialog" style="max-width: 1200px;"> <!-- 直接修改此处 -->
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="timeScanListLabel">扫描列表</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="card-body">
                <div class="table-responsive">
                  <table class="table table-hover">
                    <thead>
                      <tr>
                        <th>ID</th>
                        <th>描述</th>
                        <th>运行状态</th>
                        <th>删除</th>
                      </tr>
                    </thead>
                    <tbody id="timeScanListResults">
                      <!-- 动态内容 -->
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 自定义 JS -->
    <script src="/static/js/stock_filter.js"></script>

    <script>
        // 将 updateFilterResults 函数移到 DOMContentLoaded 事件处理程序之后
        document.addEventListener('DOMContentLoaded', function() {
            // 添加事件监听器
            //document.getElementById('marketSelect').addEventListener('change', updateFilterResults);
            //document.getElementById('periodSelect').addEventListener('change', updateFilterResults);
            
            // 为 checkbox 添加事件监听器
            //document.getElementById('dljgFilter').addEventListener('change', updateFilterResults);
            //document.getElementById('bollFilter').addEventListener('change', updateFilterResults);
            
            // 为其他筛选条件添加事件监听器
            //document.getElementById('volumeFilter').addEventListener('change', updateFilterResults);
            //document.getElementById('priceMin').addEventListener('change', updateFilterResults);
            //document.getElementById('priceMax').addEventListener('change', updateFilterResults);
            
            // 初始执行一次筛选
            //updateFilterResults();
        });

        function showTimedScanList(){

            $.get('/api/get-timed-scan-list', function(scanList) {
                const tbody = document.getElementById('timeScanListResults');
                tbody.innerHTML = ''; // 清空现有结果

                scanList.forEach(scan => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${scan.id}</td>
                        <td>${scan.name}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="viewStock('${scan.code}')">
                                查看
                            </button>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="viewStock('${scan.code}')">
                                查看
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                const modal = new bootstrap.Modal(document.getElementById('timeScanList'));
                modal.show();
            });

            
        }

        function saveTimedScan() {
           
            filters = getFilterData();
            const timeInput = document.getElementById("timeInput");
            const timeValue = timeInput.value;
            //const timeParts = timeValue.split(":");
            //const hours = parseInt(timeParts[0], 10); // 小时
            //const minutes = parseInt(timeParts[1], 10); // 分钟
            const scanNameLabel = document.getElementById("scan_name");
            const scanName = scanNameLabel.innerText;
            // 创建 Date 对象（日期部分默认为当前日期）
            filters.TriggerTime = timeValue
            filters.scanName = scanName
            console.info("saveTimedScan:", scanName)

            // 发送数据到后端
            fetch("/api/save-timed-scan", {
                method: "POST",
                headers: {
                "Content-Type": "application/json",
                },
                body: JSON.stringify(filters), // 将对象转为 JSON 字符串
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                alert("保存成功！");
                } else {
                alert("保存失败：" + data.error);
                }
            })
            .catch(error => {
                console.error("请求错误：", error);
            });
        }

        function getFilterData(){
                // 获取筛选条件
            const market = document.getElementById('marketSelect').value;
            const period = document.getElementById('periodSelect').value;
            
            // 创建信号筛选数组
            const filterSignal = [];
            const dljgChecked = document.getElementById('dljgFilter').checked;
            const bollChecked = document.getElementById('bollFilter').checked;
            
            console.log('DLJG checked:', dljgChecked); // 调试输出
            console.log('BOLL checked:', bollChecked); // 调试输出
            
            if (dljgChecked) {
                filterSignal.push('DLJG');
            }
            if (bollChecked) {
                filterSignal.push('BOLL');
            }
            
            const filters = {
                market: market,
                period: period,
                filterSignal: filterSignal,
                dayRange: document.getElementById('dayRange').value,
                priceMin: document.getElementById('priceMin').value,
                priceMax: document.getElementById('priceMax').value
            };

            return filters;
        }

        function updateFilterResults() {
            // 显示进度条
            const progressDiv = document.getElementById('filterProgress');
            const progressBar = progressDiv.querySelector('.progress-bar');
            const progressText = document.getElementById('progressText');
            progressDiv.classList.remove('d-none');
            
            // 重置进度
            progressBar.style.width = '0%';
            progressText.textContent = '0/0';
            
            filters = getFilterData();

            // 使用 EventSource 接收服务器发送的进度更新
            const eventSource = new EventSource(`/api/filter_stocks?${new URLSearchParams(filters)}`);
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type == "progress") {
                    // 更新进度条
                    const progress = (data.current / data.total) * 100;
                    progressBar.style.width = `${progress}%`;
                    progressText.textContent = `${data.current}/${data.total} (已匹配: ${data.matched_count})`;
                }
                
                if (data.success && data.data) {
                    // 更新结果表格
                    updateResultsTable(data.data);
                }
                
                if (data.progress && data.progress.current === data.progress.total) {
                    // 筛选完成，关闭 EventSource
                    eventSource.close();
                    // 隐藏进度条
                    progressDiv.classList.add('d-none');
                }
            };
            
            eventSource.onerror = function(error) {
                console.error('EventSource failed:', error);
                eventSource.close();
                progressDiv.classList.add('d-none');
                alert('筛选过程中发生错误');
            };
        }

        function updateResultsTable(results) {
            const tbody = document.getElementById('filterResults');
            tbody.innerHTML = ''; // 清空现有结果

            results.forEach(stock => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${stock.code}</td>
                    <td>${stock.name}</td>
                    <td>${stock.price}</td>
                    <td>${stock.change_pct}%</td>
                    <td>${stock.volume}</td>
                    <td>${stock.indicators.join(', ')}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="viewStock('${stock.code}')">
                            查看
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function viewStock(code) {
            // 跳转到股票详情页面
            window.location.href = `/?stock=${code}`;
        }
    </script>
</body>
</html>
