<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-0: #0a1020;
            --bg-1: #111b34;
            --panel: rgba(18, 30, 58, 0.88);
            --line: rgba(87, 130, 255, 0.35);
            --text: #d9e6ff;
            --muted: #8ea3cf;
            --accent: #35c6ff;
            --accent-2: #5e7dff;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 12% 10%, rgba(53, 198, 255, 0.16), transparent 30%),
                radial-gradient(circle at 90% 5%, rgba(94, 125, 255, 0.18), transparent 35%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            color: var(--text);
        }

        .dsa-topbar {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(6, 12, 26, 0.75);
            backdrop-filter: blur(8px);
        }

        .dsa-brand {
            font-weight: 700;
            letter-spacing: 1px;
            color: #f3f7ff;
            text-decoration: none;
        }

        .dsa-topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-toggle {
            height: 34px;
            width: 34px;
            border-radius: 10px;
            border: 1px solid rgba(87, 130, 255, 0.35);
            background: rgba(16, 27, 52, 0.55);
            color: #d9e6ff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(53, 198, 255, 0.10);
            border-color: rgba(53, 198, 255, 0.45);
            color: #f4fbff;
        }

        .dsa-layout {
            height: calc(100vh - 56px);
            width: 100%;
            display: flex;
        }

        .dsa-sidebar {
            width: 238px;
            min-width: 238px;
            border-right: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(16, 27, 52, 0.95), rgba(9, 16, 31, 0.95));
            padding: 14px 10px;
            overflow-y: auto;
            transition: width 0.2s ease, min-width 0.2s ease, padding 0.2s ease;
        }

        .dsa-layout.sidebar-collapsed .dsa-sidebar {
            width: 64px;
            min-width: 64px;
            padding: 14px 8px;
        }

        .dsa-tab {
            width: 100%;
            text-align: left;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 9px 12px;
            margin-bottom: 8px;
            color: var(--muted);
            background: transparent;
            transition: all 0.2s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dsa-tab i {
            width: 18px;
            margin-right: 8px;
        }

        .dsa-tab svg.wl-tab-star {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            margin-right: 8px;
            fill: currentColor;
        }

        .dsa-tab .tab-label {
            white-space: nowrap;
        }

        .dsa-layout.sidebar-collapsed .dsa-tab {
            justify-content: center;
            padding: 10px 10px;
        }

        .dsa-layout.sidebar-collapsed .dsa-tab i {
            margin-right: 0;
        }

        .dsa-layout.sidebar-collapsed .dsa-tab svg.wl-tab-star {
            margin-right: 0;
        }

        .dsa-layout.sidebar-collapsed .dsa-tab .tab-label {
            display: none;
        }

        .dsa-tab:hover {
            color: #dbe8ff;
            background: rgba(53, 198, 255, 0.08);
            border-color: rgba(53, 198, 255, 0.2);
        }

        .dsa-tab.active {
            color: #f4fbff;
            background: linear-gradient(90deg, rgba(53, 198, 255, 0.24), rgba(94, 125, 255, 0.22));
            border-color: rgba(83, 172, 255, 0.55);
            box-shadow: 0 0 0 1px rgba(53, 198, 255, 0.15) inset, 0 8px 20px rgba(22, 48, 104, 0.35);
        }

        .dsa-content {
            flex: 1;
            height: 100%;
            padding: 10px;
        }

        .embed-frame {
            width: 100%;
            height: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fff;
            display: block;
        }
    </style>
</head>
<body>
    <div class="dsa-topbar">
        <a class="dsa-brand" href="/dsaweb">股票分析系统 · DSA WEB</a>
        <div class="dsa-topbar-right">
            <span style="color: var(--muted); font-size: 13px;">科技风工作台</span>
            <button type="button" class="sidebar-toggle" id="sidebarToggle" title="收起/展开侧栏" aria-label="收起或展开侧栏">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </div>

    <div class="dsa-layout" id="dsaLayout">
        <aside class="dsa-sidebar" id="dsaTabs">
            <button class="dsa-tab active" data-src="/classic" title="首页"><i class="fas fa-home"></i><span class="tab-label">首页</span></button>
            <button class="dsa-tab" data-src="/indicator_manager" title="指标管理"><i class="fas fa-sliders-h"></i><span class="tab-label">指标管理</span></button>
            <button class="dsa-tab" data-src="/stock_filter" title="股票筛选器"><i class="fas fa-filter"></i><span class="tab-label">股票筛选器</span></button>
            <button class="dsa-tab" data-src="/nga_monitor" title="NGA 监控"><i class="fas fa-rss"></i><span class="tab-label">NGA 监控</span></button>
            <button class="dsa-tab" data-src="/quant" title="量化"><i class="fas fa-chart-line"></i><span class="tab-label">量化</span></button>
            <button class="dsa-tab" data-src="/market_open_score" title="今日大盘开盘评分"><i class="fas fa-sun"></i><span class="tab-label">今日大盘开盘评分</span></button>
            <button class="dsa-tab" data-src="/positions" title="持仓管理"><i class="fas fa-briefcase"></i><span class="tab-label">持仓管理</span></button>
            <button class="dsa-tab" data-src="/watchlist" title="自选列表"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" class="wl-tab-star" aria-hidden="true"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg><span class="tab-label">自选列表</span></button>
            <button class="dsa-tab" data-src="/investment_calendar" title="投资日历"><i class="fas fa-calendar-alt"></i><span class="tab-label">投资日历</span></button>
            <button class="dsa-tab" data-src="/signal_notify" title="信号通知"><i class="fas fa-bell"></i><span class="tab-label">信号通知</span></button>
            <button class="dsa-tab" data-src="/scheduled_tasks" title="定时任务"><i class="fas fa-clock"></i><span class="tab-label">定时任务</span></button>
            <button class="dsa-tab" data-src="/settings_console" title="设置"><i class="fas fa-cog"></i><span class="tab-label">设置</span></button>
        </aside>

        <main class="dsa-content">
            <iframe
                class="embed-frame"
                src="/classic"
                title="dsa-embedded-content"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </main>
    </div>

    <script>
        (function () {
            const layout = document.getElementById('dsaLayout');
            const toggle = document.getElementById('sidebarToggle');
            const frame = document.querySelector('.embed-frame');
            const tabs = document.querySelectorAll('#dsaTabs .dsa-tab');

            const applyCollapsed = (collapsed) => {
                if (!layout) return;
                layout.classList.toggle('sidebar-collapsed', !!collapsed);
            };

            const collapsedSaved = localStorage.getItem('dsaweb:sidebar-collapsed');
            if (collapsedSaved === '1') {
                applyCollapsed(true);
            }

            if (toggle) {
                toggle.addEventListener('click', function () {
                    const nowCollapsed = !layout.classList.contains('sidebar-collapsed');
                    applyCollapsed(nowCollapsed);
                    localStorage.setItem('dsaweb:sidebar-collapsed', nowCollapsed ? '1' : '0');
                });
            }

            const saved = localStorage.getItem('dsaweb:last-tab');
            if (saved) {
                const target = Array.from(tabs).find((t) => t.dataset.src === saved);
                if (target) {
                    tabs.forEach((t) => t.classList.remove('active'));
                    target.classList.add('active');
                    frame.src = target.dataset.src;
                }
            }

            tabs.forEach((tab) => {
                tab.addEventListener('click', function () {
                    tabs.forEach((t) => t.classList.remove('active'));
                    this.classList.add('active');
                    frame.src = this.dataset.src;
                    localStorage.setItem('dsaweb:last-tab', this.dataset.src);
                });
            });
        })();
    </script>
</body>
</html>
